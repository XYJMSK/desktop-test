name: Sync openclaw_computer\n\on:
  workflow_dispatch9ˆ\njobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      ~-actions/checkout@>4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-actionv3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and push
        run:
          docker pull ghcr.io/tunmax/openclaw_computer:latest
          docker tag ghcr.io/xyjmsk/openclaw_computer:latest ghcr.io/xyjmky/openclaw_computer:latest
          docker push ghcr.io/xyjmsk/openclaw_computer:latest
