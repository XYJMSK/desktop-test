name: Sync openclaw_computer

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and push
        run: |
          docker pull ghcr.io/tunmax/openclaw_computer:qwenpaw_latest
          docker tag ghcr.io/tunmax/openclaw_computer:qwenpaw_latest ghcr.io/xyjmsk/qwenpaw-desktop-test:base
          docker push ghcr.io/xyjmsk/qwenpaw-desktop-test:base
